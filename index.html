<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FocusTimer</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<div class="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <h1>Focus<span>Timer</span></h1>

  <nav>
    <button class="nav-btn active" data-view="timer">Timer</button>
    <button class="nav-btn" data-view="calendar">Calendar</button>
    <button class="nav-btn" data-view="stats">Stats</button>
    <button class="nav-btn" data-view="settings">Settings</button>
  </nav>

  <section id="calendarView" class="view hidden">
    <div id="calendarGrid" class="calendar-grid"></div>
  </section>

  <section id="statsView" class="view hidden">
    <h3>Total Sessions</h3>
    <p id="totalSessions">0</p>
  </section>

  <section id="settingsView" class="view hidden">
    <h3>Settings</h3>
    <label>Work Minutes</label>
    <input id="workInput" type="number" value="25">
  </section>

  <blockquote id="quote"></blockquote>
</aside>

<!-- MAIN -->
<main class="main">

<section id="timerView" class="view active">

<div class="timer-ring">
<svg viewBox="0 0 260 260">
<circle class="track" cx="130" cy="130" r="105"></circle>
<circle class="progress" cx="130" cy="130" r="105"></circle>
</svg>
<div id="timerText">25:00</div>
</div>

<div class="time-adjust">
<button id="minusBtn">-5</button>
<button id="plusBtn">+5</button>
</div>

<div class="controls">
<button id="startPauseBtn">▶</button>
<button id="resetBtn">↻</button>
<button id="stopAlarmBtn">🔕</button>
</div>

<input id="focusInput" placeholder="What are you focusing on?">

</section>
</main>

<!-- RIGHT -->
<aside class="right-panel">

<div class="music-card">
<h3>Lo-fi Beats</h3>

<iframe style="border-radius:12px"
src="https://open.spotify.com/embed/playlist/37i9dQZF1DX8Uebhn9wzrS"
width="100%" height="352"
frameborder="0"
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
</iframe>
</div>

<div class="pip-card">
<h3>Miniplayer</h3>
<button id="pipBtn">Open</button>
</div>

</aside>

</div>

<audio id="alarm">
<source src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg">
</audio>

<script src="script.js"></script>
</body>
</html>
